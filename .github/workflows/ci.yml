name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Run unit tests
        run: mvn test --no-transfer-progress
        # BigQuery is mocked in controller tests — no GCP credentials required.
        # Integration tests are skipped here (they run in integration-test.yml).
